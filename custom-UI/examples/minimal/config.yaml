# yaml-language-server: $schema=../../agent-ui.schema.json
page:
  layout_type: "grid"
  theme:
    mode: "light"
    accent: "#469BE5"

widgets:
  - name: "header"
    type: "page-header"
    position:
      horizontal: "left"
      vertical: "high"
    size:
      width: 12
      height: "auto"
    title: "My Dashboard"
    subtitle: "agent-ui minimal example"

  - name: "Quick actions"
    type: "button-group"
    position:
      horizontal: "left"
      vertical: "high"
    size:
      width: 12
      height: "auto"
    buttons:
      - label: "Refresh"
        action: "refresh_data"
        variant: "default"
      - label: "Settings"
        action: "open_settings"
        variant: "outline"
      - label: "Delete all"
        action: "delete_all"
        variant: "destructive"

  - name: "agent-output"
    type: "ai-response"
    position:
      horizontal: "left"
      vertical: "middle"
    size:
      width: 12
      height: "auto"
    empty_text: "Ask the agent something below."

  - name: "chat-input"
    type: "ai-chat-input"
    position:
      horizontal: "left"
      vertical: "low"
    size:
      width: 12
      height: "auto"
    placeholder: "Ask the agent…"

  - name: "footer"
    type: "page-footer"
    size:
      width: 12
      height: "auto"
    text: "agent-ui app"
