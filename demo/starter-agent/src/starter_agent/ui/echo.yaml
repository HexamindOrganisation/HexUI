# Echo — the starter agent's UI. Served by GET /agents/echo/ui.
# The active agent's main_color is the only color in the product.
#
# Everything visible is a widget; the sidebar, history, and file tree are shell
# chrome the platform provides. This minimal layout is a transcript + composer.
# See custom-UI/docs/widgets.md for the full widget catalog (table, form,
# button-group, tool-calls, …) and CONTRACT.md §5b to wire data_source/action.
page:
  layout_type: grid
  main_color: "#6366f1"

widgets:
  - name: transcript
    type: ai-response
    position: { horizontal: left, vertical: high }
    size: { width: 12, height: 520 }
    empty_text: "Say something to Echo."
    thinking_indicator: dots

  - name: chat-input
    type: ai-chat-input
    position: { horizontal: left, vertical: low }
    size: { width: 12, height: auto }
    placeholder: "Message Echo…"
    rows: 2
