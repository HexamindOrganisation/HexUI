# Probe — Research & retrieval. Served by GET /agents/probe/ui.
# The active agent's main_color is the only color in the product.
page:
  layout_type: grid
  main_color: "#3f9d94"

widgets:
  - name: transcript
    type: ai-response
    position: { horizontal: left, vertical: high }
    size: { width: 12, height: 520 }
    empty_text: "Ask Probe to research something."
    thinking_indicator: dots

  - name: chat-input
    type: ai-chat-input
    position: { horizontal: left, vertical: low }
    size: { width: 12, height: auto }
    placeholder: "Ask Probe…"
    rows: 2
